{% extends 'base.html' %}

{% block title %}{{ post.title }} - Блогикум{% endblock %}

{% block content %}
<article class="post-detail">
    <h1>{{ post.title }}</h1>
    <div class="post-meta">
        <p>Место: {{ post.location }}</p>
        <p>Дата: {{ post.pub_date }}</p>
        <p>Категория: <a href="{% url 'blog:category' post.category %}">{{ post.category }}</a></p>
    </div>
    <div class="post-text">
        {{ post.text }}
    </div>
</article>

<a href="{% url 'blog:index' %}" class="back-link">← Вернуться к ленте</a>
{% endblock %}
