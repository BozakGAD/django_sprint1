{% load static %}
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Блогикум{% endblock %}</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>
    <header>
        <div class="container">
            <h1><a href="{% url 'blog:index' %}">Блогикум</a></h1>
            <nav>
                <ul>
                    <li><a href="{% url 'blog:index' %}">Лента записей</a></li>
                    <li><a href="{% url 'pages:about' %}">О проекте</a></li>
                    <li><a href="{% url 'pages:rules' %}">Наши правила</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main class="container">
        {% block content %}{% endblock %}
    </main>

    <footer>
        <div class="container">
            <p>© Блогикум</p>
        </div>
    </footer>
</body>
</html>
